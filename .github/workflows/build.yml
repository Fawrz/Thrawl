name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Thrawl
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Thrawl -> target

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Run unit tests
        run: cargo test --manifest-path Thrawl/Cargo.toml

      - name: Build module
        run: bash Thrawl/build.sh

      - name: Prepare artifact metadata
        id: prepare
        run: |
          set -e
          ZIP_FILE=$(find Thrawl/build-out -maxdepth 1 -name "thrawl-*-release.zip" | head -1)
          SUMS_FILE="Thrawl/build-out/SHA256SUMS"
          test -f "$ZIP_FILE" || { echo "release zip not found"; exit 1; }
          test -f "$SUMS_FILE" || { echo "SHA256SUMS not found"; exit 1; }
          ZIP_NAME=$(basename "$ZIP_FILE")
          echo "zipName=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify module.prop
        run: |
          set -e
          ZIP_FILE=$(find Thrawl/build-out -maxdepth 1 -name "thrawl-*-release.zip" | head -1)
          VERSION=$(unzip -p "$ZIP_FILE" module.prop | grep '^version=' | cut -d= -f2-)
          test -n "$VERSION" || { echo "version missing in module.prop"; exit 1; }
          echo "module.prop version=$VERSION"

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.zipName }}
          path: Thrawl/build-out/thrawl-*-release.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS-${{ github.run_number }}
          path: Thrawl/build-out/SHA256SUMS
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: ${{ steps.prepare.outputs.zipName }}" >> "$GITHUB_STEP_SUMMARY"
