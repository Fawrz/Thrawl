# === Chimera Configuration ===

# --- PSI Backend (only when /proc/pressure/memory exists) ---
PSI_AVAILABLE=auto
PSI_THRESHOLD=70
PSI_POLL_TIMEOUT_MS=5000
SWAPPINESS_LOW=40
SWAPPINESS_HIGH=120

# --- Legacy Backend (only when PSI unavailable) ---
LEGACY_PRESSURE_THRESHOLD=65
LEGACY_HYSTERESIS=10
LEGACY_POLL_INTERVAL_MS=5000

# --- ZRAM ---
ZRAM_ENABLE=1
ZRAM_COUNT=4
ZRAM_SIZE_MB=0
ZRAM_COMP_ALGO=zstd

# --- Swap ---
SWAP_ENABLE=1
SWAP_SIZE_MB=0
SWAP_PATH=/data/adb/chimera/swap

# --- VM Controller ---
VM_POLL_INTERVAL_MS=5000
VM_SWAP_USAGE_LOW=40
VM_SWAP_USAGE_HIGH=80
VM_IDLE_TIMEOUT_S=300

# --- LMKD ---
LMKD_USE_PSI=auto
LMKD_USE_MINFREE=auto

# --- UFFD GC ---
UFFD_GC_ENABLE=0

# --- Logging ---
LOGGING_ENABLE=1
LOG_LEVEL=info
LOG_MAX_SIZE_KB=1024
LOG_RETAIN_COUNT=3

# --- Internal ---
CONFIG_POLL_INTERVAL_MS=5000
